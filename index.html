<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTip - Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="device-container">
        <div class="solar-panel"></div>
        <div class="lcd-display">
            <div id="lcd-main" class="lcd-main">Tip Amount: <span id="displayTip">$0.00</span></div>
            <div id="lcd-sub" class="lcd-sub">Total Per Person: <span id="displayPerPerson">$0.00</span></div>
        </div>
        <div class="logo"><img src="images/SDGKU.png" alt="Logo" class="logo-img"></div>
        <div class="button-row">
            <input type="number" id="billAmount" class="device-btn" placeholder="Bill Amount ($)" step="0.01">
            <input type="number" id="peopleCount" class="device-btn" placeholder="People" min="1">
        </div>
        <div class="button-row">
            <button class="tip-btn device-btn" data-pct="15">15%</button>
            <button class="tip-btn device-btn" data-pct="20">20%</button>
            <button class="tip-btn device-btn" data-pct="25">25%</button>
            <input type="number" id="customTip" class="device-btn" placeholder="Custom %">
        </div>
        <div class="button-row">
            <button id="resetBtn" class="device-btn wide-btn" type="button">Reset</button>
            <button id="calculateBtn" class="device-btn wide-btn" type="button">Calculate</button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
