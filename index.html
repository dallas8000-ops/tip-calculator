<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTip - Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>QuickTip</h1>
        </header>

        <section class="calculator-card">
            <div class="input-group">
                <label for="billAmount">Bill Amount ($)</label>
                <input type="number" id="billAmount" placeholder="0.00" step="0.01">
            </div>

            <div class="input-group">
                <label>Select Tip (%)</label>
                <div class="tip-grid">
                    <button class="tip-btn" data-pct="15">15%</button>
                    <button class="tip-btn" data-pct="20">20%</button>
                    <button class="tip-btn" data-pct="25">25%</button>
                    <input type="number" id="customTip" placeholder="Custom %">
                </div>
            </div>

            <div class="input-group">
                <label for="peopleCount">Number of People</label>
                <input type="number" id="peopleCount" placeholder="1" min="1">
            </div>

            <hr>

            <div class="results">
                <div class="result-row">
                    <span>Tip Amount:</span>
                    <strong id="displayTip">$0.00</strong>
                </div>
                <div class="result-row total">
                    <span>Total Per Person:</span>
                    <strong id="displayPerPerson">$0.00</strong>
                </div>
            </div>
            <div style="text-align:center; margin-top:1.5rem;">
                <button id="resetBtn" type="button" style="padding:10px 24px; background:var(--dark); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Reset</button>
            </div>
        </section>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
